<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stem Waveform Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #fff;
    }

    #error-message {
      display: none;
      background: #ff4444;
      color: white;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }

    .waveform-container {
      background: #0a0a0c;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    #waveform-canvas {
      width: 100%;
      height: 400px;
      display: block;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .control-panel {
      background: #252525;
      padding: 20px;
      border-radius: 8px;
    }

    .control-panel h2 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #444;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #4CAF50;
      border-radius: 50%;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #4CAF50;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .slider-value {
      font-size: 14px;
      color: #ccc;
      float: right;
    }

    button {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    button:hover {
      background: #444;
      border-color: #666;
    }

    button.active {
      background: #4CAF50;
      border-color: #4CAF50;
    }

    #play-button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      background: #4CAF50;
      border-color: #4CAF50;
      margin-bottom: 15px;
    }

    #play-button:hover {
      background: #45a049;
    }

    select {
      width: 100%;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
    }

    .stem-control {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .stem-control h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #fff;
      text-transform: uppercase;
    }

    .stem-control.drums h3 { color: #ff5555; }
    .stem-control.bass h3 { color: #5599ff; }
    .stem-control.vocals h3 { color: #ffcc55; }
    .stem-control.other h3 { color: #55ff99; }

    .stem-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .stem-buttons button {
      flex: 1;
    }

    #time-display {
      font-size: 18px;
      text-align: center;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 4px;
      margin-bottom: 15px;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎚️ Stem-Aware Deck HUD Demo</h1>

    <div id="error-message"></div>

    <div class="waveform-container">
      <canvas id="waveform-canvas"></canvas>
    </div>

    <div class="controls">
      <!-- Playback Controls -->
      <div class="control-panel">
        <h2>Playback</h2>

        <button id="play-button">Play</button>

        <div id="time-display">0:00 / 0:00</div>

        <div class="control-group">
          <label>
            Zoom
            <span class="slider-value" id="zoom-value">1.00x</span>
          </label>
          <input type="range" id="zoom-slider" min="0.1" max="10" step="0.1" value="1">
        </div>

        <div class="control-group">
          <label>Blend Mode</label>
          <select id="blend-mode">
            <option value="additive">Additive</option>
            <option value="screen">Screen</option>
            <option value="overlay">Overlay</option>
            <option value="max">Max</option>
          </select>
        </div>

        <div class="control-group checkbox-group">
          <input type="checkbox" id="beat-grid-toggle" checked>
          <label for="beat-grid-toggle">Show Beat Grid</label>
        </div>
      </div>

      <!-- Stem Controls -->
      <div class="control-panel">
        <h2>Stem Controls</h2>

        <!-- Drums -->
        <div class="stem-control drums">
          <h3>Drums</h3>
          <div class="control-group">
            <label>
              Gain
              <span class="slider-value" id="drums-gain-value">1.00</span>
            </label>
            <input type="range" id="drums-gain" min="0" max="2" step="0.01" value="1">
          </div>
          <div class="control-group">
            <label>
              Opacity
              <span class="slider-value" id="drums-opacity-value">1.00</span>
            </label>
            <input type="range" id="drums-opacity" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="stem-buttons">
            <button id="drums-mute">Mute</button>
            <button id="drums-solo">Solo</button>
          </div>
        </div>

        <!-- Bass -->
        <div class="stem-control bass">
          <h3>Bass</h3>
          <div class="control-group">
            <label>
              Gain
              <span class="slider-value" id="bass-gain-value">1.00</span>
            </label>
            <input type="range" id="bass-gain" min="0" max="2" step="0.01" value="1">
          </div>
          <div class="control-group">
            <label>
              Opacity
              <span class="slider-value" id="bass-opacity-value">1.00</span>
            </label>
            <input type="range" id="bass-opacity" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="stem-buttons">
            <button id="bass-mute">Mute</button>
            <button id="bass-solo">Solo</button>
          </div>
        </div>

        <!-- Vocals -->
        <div class="stem-control vocals">
          <h3>Vocals</h3>
          <div class="control-group">
            <label>
              Gain
              <span class="slider-value" id="vocals-gain-value">1.00</span>
            </label>
            <input type="range" id="vocals-gain" min="0" max="2" step="0.01" value="1">
          </div>
          <div class="control-group">
            <label>
              Opacity
              <span class="slider-value" id="vocals-opacity-value">1.00</span>
            </label>
            <input type="range" id="vocals-opacity" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="stem-buttons">
            <button id="vocals-mute">Mute</button>
            <button id="vocals-solo">Solo</button>
          </div>
        </div>

        <!-- Other -->
        <div class="stem-control other">
          <h3>Other</h3>
          <div class="control-group">
            <label>
              Gain
              <span class="slider-value" id="other-gain-value">1.00</span>
            </label>
            <input type="range" id="other-gain" min="0" max="2" step="0.01" value="1">
          </div>
          <div class="control-group">
            <label>
              Opacity
              <span class="slider-value" id="other-opacity-value">1.00</span>
            </label>
            <input type="range" id="other-opacity" min="0" max="1" step="0.01" value="1">
          </div>
          <div class="stem-buttons">
            <button id="other-mute">Mute</button>
            <button id="other-solo">Solo</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./stem-waveform-demo.js"></script>
</body>
</html>
